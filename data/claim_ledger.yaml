    freshness: "active"

  - id: "fact:eq_integrity_vector"
    kind: "equation"
    value: "eq:integrity_vector"
    statement: "The generated manuscript defines the integrity vector equation label."
    source: "src/formalisms.py::FORMALISMS"
    artifact_path: "src/formalisms.py"
    source_tier: "claim_ledger"
    freshness: "active"

  - id: "fact:eq_certification_predicate"
