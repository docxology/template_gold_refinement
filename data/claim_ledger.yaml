  - id: "fact:integrity_dimension_count"
    kind: "number"
    value: 9
    statement: "The source-owned integrity model emits 9 integrity dimensions."
    source: "src/integrity.py::build_integrity_dimensions"
    artifact_path: "src/integrity.py"
    source_tier: "claim_ledger"
