# Claim ledger for template_gold_refinement
# Registers manuscript numeric claims sourced from code, captions, or artifacts
# rather than {{TOKEN}} variables.

claims:
  - id: "claim:five_stages"
    statement: "The refinery pipeline has 5 canonical stages."
    source: "src/refinery.py::CANONICAL_STAGES"
    evidence_type: "code"
    boundary: "local"

  - id: "claim:monotone_purity"
    statement: "Purity increases monotonically across all refinery stages."
    source: "src/purity.py::assert_monotone_increase"
    evidence_type: "code"
    boundary: "local"

  - id: "claim:nine_nines"
    statement: "The certification stage achieves 99.9999999% purity (nine-nines)."
    source: "src/purity.py::NINE_NINES_PURITY"
    evidence_type: "code"
    boundary: "local"

  - id: "claim:seed_431"
    statement: "Token selection uses seed 431 for deterministic reproducibility."
    source: "manuscript/config.yaml::gold_refinement.seed"
    evidence_type: "config"
    boundary: "local"

  - id: "claim:sha256_digest"
    statement: "Token selection uses SHA-256 digest over seed, slot, category, ordinal, and inventory."
    source: "src/composition.py::_choose_value"
    evidence_type: "code"
    boundary: "local"

  - id: "claim:formalism_registry"
    statement: "The manuscript exposes 7 source-owned formalisms with equation labels."
    source: "src/formalisms.py::FORMALISMS"
    evidence_type: "code"
    boundary: "local"

  - id: "claim:claim_support_report_separation"
    statement: "The project-local contribution-claim report is written to claim_support_registry.json."
    source: "scripts/refinement_analysis.py::CLAIM_SUPPORT_REGISTRY_NAME"
    evidence_type: "script"
    boundary: "local"

  - id: "claim:implementation_linked_visualizations"
    statement: "The manuscript includes generated visualizations that link the refinery analogy to source code, variables, evidence, and validation gates."
    source: "src/figures/diagrams.py::generate_implementation_circuit"
    evidence_type: "code"
    boundary: "local"

  - id: "claim:scientific_integrity_risk_model"
    statement: "The manuscript includes a source-owned integrity risk model linking failure modes, validators, evidence surfaces, and fork obligations."
    source: "src/integrity.py::build_integrity_dimensions"
    evidence_type: "code"
    boundary: "local"

  - id: "claim:adversarial_security_assay"
    statement: "The manuscript includes a source-owned security assay mapping adversarial threats and standards to local evidence surfaces, validators, and claim boundaries."
    source: "src/security_assay.py::build_security_assay"
    evidence_type: "code"
    boundary: "local"

  - id: "fact:eq_purity_functional"
    kind: "equation"
    value: "eq:purity_functional"
    statement: "The generated manuscript defines the purity functional equation label."
    source: "src/formalisms.py::FORMALISMS"
    artifact_path: "src/formalisms.py"
    source_tier: "claim_ledger"
    freshness: "active"

  - id: "fact:eq_monotone_refinery"
    kind: "equation"
    value: "eq:monotone_refinery"
    statement: "The generated manuscript defines the monotone refinery equation label."
    source: "src/formalisms.py::FORMALISMS"
    artifact_path: "src/formalisms.py"
    source_tier: "claim_ledger"
    freshness: "active"

  - id: "fact:eq_token_digest"
    kind: "equation"
    value: "eq:token_digest"
    statement: "The generated manuscript defines the token digest equation label."
    source: "src/formalisms.py::FORMALISMS"
    artifact_path: "src/formalisms.py"
    source_tier: "claim_ledger"
    freshness: "active"

  - id: "fact:eq_claim_support"
    kind: "equation"
    value: "eq:claim_support"
    statement: "The generated manuscript defines the claim support equation label."
    source: "src/formalisms.py::FORMALISMS"
    artifact_path: "src/formalisms.py"
