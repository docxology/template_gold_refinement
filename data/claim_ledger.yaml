  - id: "fact:fig_integrity_risk_matrix"
    kind: "figure"
    value: "fig:integrity_risk_matrix"
    statement: "The generated manuscript defines the scientific-integrity risk matrix figure label."
    source: "src/figures/diagrams.py::generate_integrity_risk_matrix"
    artifact_path: "output/figures/integrity_risk_matrix.png"
    source_tier: "claim_ledger"
    freshness: "active"

  - id: "fact:fig_evidence_tier_ladder"
    kind: "figure"
