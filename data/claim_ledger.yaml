    statement: "The generated manuscript defines the evidence-tier ladder figure label."
    source: "src/figures/diagrams.py::generate_evidence_tier_ladder"
    artifact_path: "output/figures/evidence_tier_ladder.png"
    source_tier: "claim_ledger"
    freshness: "active"

non_claims:
  - id: "nonclaim:empirical_validation"
    statement: "The analogy is not empirically validated against external manuscript quality metrics."
    boundary: "local"
  - id: "nonclaim:domain_generalizability"
    statement: "Specific purity fractions are not generalized to all scientific domains."
    boundary: "local"
  - id: "nonclaim:security_compliance"
    statement: "The manuscript does not claim NIST, SLSA, Sigstore, MITRE, CycloneDX, SPDX, or CISA compliance."
    boundary: "local"
  - id: "nonclaim:codex_security_scan"
    statement: "The manuscript does not claim that a Codex Security or Deep Security Scan has been run."
    boundary: "local"
