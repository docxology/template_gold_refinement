gold_refinement:
  seed: 431
  composition_depth: "deep"
  hypothesis: "Gold-refining metallurgy provides a load-bearing pipeline for scientific manuscript composition: each stage (ore, smelting, assaying, cupellation, certification) maps to a real template-infrastructure operation, and purity increases monotonically from 9K to nine-nines."
  seed_sensitivity:
    sample_size: 1024
    seed_start: 0
    agreement_threshold: 0.25
    confidence_level: 0.95
    precision_target: 0.05
    bootstrap_replicates: 2000
    seed_sampling_scheme: "contiguous_integer_seeds"
    precision_assumption: "Conditional on exchangeable random-seed draws; the declared contiguous seed range is a sensitivity surface, not an empirical population."
    sample_size_ladder: [16, 32, 64, 128, 256, 512, 1024]
  section_conditions:
    abstract: true
    introduction: true
    methodology: true
    results: true
    discussion: true
    conclusion: true
    reproducibility: true
    scope: true
    evaluation: true
    authoring_contract: true
  section_titles:
    abstract: "Abstract"
    introduction: "Introduction: Ore to Nine-Nines"
    methodology: "Methodology: The Refinery Pipeline"
    results: "Results: Purity Progression and Karat Grading"
    discussion: "Discussion: Load-Bearing vs Rhetorical Analogy"
    conclusion: "Conclusion: Certification and Forking"
    reproducibility: "Reproducibility: Seeded Regeneration"
    scope: "Scope: Related Work and Limitations"
    evaluation: "Evaluation: QA Probes and Audit Rules"
    authoring_contract: "Authoring Contract: Human Review and Forking Obligations"
  narrative_moves:
    abstract:
      - "state the refinement problem"
      - "name the metallurgical analogy"
      - "summarize the purity targets"
    introduction:
      - "frame gold refining as a load-bearing pipeline"
      - "distinguish analogy from mere rhetoric"
      - "introduce the mega-madlib token engine"
    methodology:
      - "declare the five refinery stages"
      - "explain deterministic token selection"
      - "connect purity to manuscript operations"
    results:
      - "report purity progression across stages"
      - "show karat grading for each stage"
      - "bind every token to provenance"
    discussion:
      - "bound the claim"
      - "describe useful adaptation cases"
      - "name misuse modes"
    conclusion:
      - "summarize certification"
      - "state fork responsibilities"
    reproducibility:
      - "fix seed and config hash"
      - "write machine-readable artifacts"
      - "rerender through the pipeline"
    scope:
      - "distinguish analogy from truth"
      - "limit publication claims"
      - "explain responsible forking"
  lexicon:
    metallurgical_terms:
      - "cupellation"
      - "assaying"
      - "smelting"
      - "parting"
      - "hallmark"
    manuscript_terms:
      - "draft"
      - "claim"
      - "citation"
      - "cross-reference"
      - "evidence"
    purity_adjectives:
      - "unrefined"
      - "purified"
      - "certified"
      - "immaculate"
      - "nine-nines"
    refinement_verbs:
      - "assaying"
      - "certifying"
      - "refining"
      - "smelting"
      - "cupellating"
    integrity_terms:
      - "evidence spine"
      - "source tier"
      - "validation gate"
      - "claim ledger"
      - "render contract"
    evidence_terms:
      - "fact registry"
      - "artifact manifest"
      - "citation check"
      - "figure registry"
      - "token provenance"
    boundary_terms:
      - "local claim"
      - "analogy boundary"
      - "fork obligation"
      - "domain validator"
      - "non-claim"
    gate_terms:
      - "prerender"
      - "evidence validation"
      - "figure registry check"
      - "citation validation"
      - "coverage gate"
  slots:
    - name: "INTRO_INTEGRITY_TERM"
      category: "integrity_terms"
      count: 2
      section: "introduction"
    - name: "METHOD_METAL_TERM"
      category: "metallurgical_terms"
      count: 3
      section: "methodology"
    - name: "METHOD_MANUSCRIPT_TERM"
      category: "manuscript_terms"
      count: 2
      section: "methodology"
    - name: "METHOD_GATE_TERM"
      category: "gate_terms"
      count: 3
      section: "methodology"
    - name: "RESULTS_PURITY_ADJ"
      category: "purity_adjectives"
      count: 2
      section: "results"
    - name: "RESULTS_EVIDENCE_TERM"
      category: "evidence_terms"
      count: 3
      section: "results"
    - name: "DISCUSSION_REFINEMENT_VERB"
      category: "refinement_verbs"
      count: 1
      section: "discussion"
    - name: "DISCUSSION_BOUNDARY_TERM"
      category: "boundary_terms"
      count: 2
      section: "discussion"
    - name: "REPRO_EVIDENCE_TERM"
      category: "evidence_terms"
      count: 2
      section: "reproducibility"
    - name: "EVALUATION_GATE_TERM"
      category: "gate_terms"
      count: 2
      section: "evaluation"
    - name: "AUTHORING_BOUNDARY_TERM"
      category: "boundary_terms"
      count: 2
      section: "authoring_contract"
  design_principles:
    - name: "Analogy is load-bearing"
      rationale: "Each metallurgical stage maps to a real template-infrastructure operation, not mere decoration."
    - name: "Purity increases monotonically"
      rationale: "The refinery pipeline guarantees strictly increasing purity from ore to certification."
    - name: "Token selection is deterministic"
      rationale: "A fixed seed and lexicon produce the same injection plan across reruns."
    - name: "Configuration owns prose choices"
      rationale: "Reviewers can inspect the declared language surface before generation."
    - name: "Generated output is disposable"
      rationale: "The durable artifact is the regeneration contract, not hand-edited output."
    - name: "Scholarship sets boundaries"
      rationale: "External sources can anchor analogy, reproducibility, and provenance claims, but they cannot expand local certification beyond what the source-owned evidence supports."
    - name: "Completeness is not validity"
      rationale: "Checklist-shaped gates can show that required reporting surfaces are present and traceable, but they do not certify domain truth, study design quality, or absence of bias."
    - name: "Executable package is the object"
      rationale: "Narrative, config, code, metadata, figures, reports, and rendered outputs must travel as a rebuildable package rather than as detached static prose."
    - name: "Adversarial purity is bounded"
      rationale: "Security standards frame threats and evidence requirements, but local certification cannot claim compliance or scan results without source-owned artifacts."
  quality_probes:
    - name: "Monotone purity"
      question: "Does purity increase strictly across all refinery stages?"
      passing_signal: "assert_monotone_increase passes on the purity sequence."
      artifact: "src/refinery.py and output/data/refinery_results.json"
    - name: "Token provenance"
      question: "Can every selected token be traced to a category, section, value, and config key?"
      passing_signal: "The token plan contains one row for each generated token."
      artifact: "output/reports/token_plan.json"
    - name: "Karat grade correctness"
      question: "Does each stage map to the correct karat grade?"
      passing_signal: "karat_for_purity returns the expected grade for each stage."
      artifact: "src/purity.py"
    - name: "Integrity risk visibility"
      question: "Can the manuscript identify high-severity integrity failures and the validator or artifact that detects them?"
      passing_signal: "The integrity risk model emits dimensions, owners, residual risk scores, and evidence-tier rows."
      artifact: "src/integrity.py and output/figures/integrity_risk_matrix.png"
    - name: "Scholarship boundary"
      question: "Do pre-1800 metallurgy references support the analogy, reproducibility, provenance, and source-domain framing without being used as evidence for universal manuscript-quality claims?"
      passing_signal: "The scope, discussion, and evaluation sections cite historically bounded metallurgy scholarship while keeping certification local to source-owned gates."
      artifact: "manuscript/references.bib and manuscript/07_scope.md"
    - name: "Reporting-guideline completeness"
      question: "Does the manuscript distinguish checklist-style completeness from methodological validity?"
      passing_signal: "The methods, scope, discussion, and evaluation sections cite reporting-guideline scholarship while explicitly limiting what the local gates prove."
      artifact: "manuscript/02_methodology.md, manuscript/04_discussion.md, manuscript/07_scope.md, and manuscript/08_evaluation.md"
    - name: "Executable-compendium identity"
      question: "Can a reader identify the executable package, metadata stack, software release, and generated artifacts needed to rebuild the manuscript?"
      passing_signal: "The reproducibility, scope, evaluation, and authoring-contract sections cite executable-publication and software-citation scholarship while keeping preservation and portability claims bounded."
      artifact: "manuscript/06_reproducibility.md, manuscript/07_scope.md, manuscript/08_evaluation.md, manuscript/09_authoring_contract.md, output/reports/evidence_registry.json, and output/reports/output_statistics.json"
    - name: "Adversarial assay boundary"
      question: "Does security language distinguish declared threat scope from real scan evidence and external compliance?"
      passing_signal: "The security assay emits threats, standards, evidence surfaces, validators, and claim boundaries without claiming Codex Security findings."
      artifact: "src/security_assay.py, manuscript/config.yaml, and manuscript/03_results.md"
    - name: "Seed sensitivity"
      question: "Does the expanded seed study quantify token-plan variability without presenting seeds as empirical manuscript observations?"
      passing_signal: "The generated report records n, agreement distribution, interval methods, conditional assumptions, bootstrap sensitivity, precision radius, and the sample-size ladder."
      artifact: "src/seed_sensitivity.py, output/data/seed_sensitivity.json, and manuscript/03_results.md"
  failure_modes:
    - name: "Non-monotone purity"
      risk: "A stage has lower output purity than input."
      detection: "assert_monotone_increase raises ValueError."
      mitigation: "Fix stage purity targets in src/refinery.py."
    - name: "Empty lexicon category"
      risk: "A required lexicon category is empty or missing."
      detection: "Config validation raises GoldRefinementConfigError."
      mitigation: "Add vocabulary to manuscript/config.yaml."
    - name: "Unresolved token"
      risk: "A manuscript placeholder has no generated variable."
      detection: "test_all_manuscript_tokens_are_generated fails."
      mitigation: "Add variable in src/manuscript_variables.py."
    - name: "Rhetorical-only analogy"
      risk: "The analogy is decorative with no operational mapping."
      detection: "Review that each stage maps to a real infrastructure operation."
      mitigation: "Connect stages to template pipeline operations."
    - name: "Undetected integrity gap"
      risk: "A high-severity failure mode is present but no owner, validator, or generated artifact makes it visible."
      detection: "build_integrity_dimensions lists severity, detectability, owner, validator, and evidence surface."
      mitigation: "Add or revise the source-owned integrity dimension before promoting the manuscript."
    - name: "Citation laundering"
      risk: "A real citation is used to make a stronger claim than the source supports."
      detection: "Scope and evaluation prose separate analogy support, reproducibility support, and domain-evidence support."
      mitigation: "Lower the claim boundary or add a source-owned validator before using certification language."
    - name: "Checklist theater"
      risk: "A fork treats filled reporting rows or passed template gates as proof of scientific validity."
      detection: "Methods, scope, discussion, and evaluation prose separate completeness, traceability, and reproducibility from domain truth."
      mitigation: "Add the field's reporting guideline, domain validators, and independent evidence before making compliance or validity claims."
    - name: "Executable-package ambiguity"
      risk: "A fork publishes a rendered manuscript without enough software, metadata, or version identity to rebuild the object."
      detection: "Reproducibility, scope, evaluation, and authoring-contract prose require source-owned metadata, exact release citation, and regenerated output reports."
      mitigation: "Record software/template release identity, preserve source-owned metadata, and rerun the full pipeline before publishing."
    - name: "Security theater"
      risk: "Security language is presented as compliance, secure-by-design proof, or scan evidence without generated artifacts."
      detection: "Security assay rows require a threat, standard, evidence surface, validator, and claim boundary."
      mitigation: "Keep security claims bounded to the configured assay unless validated scan receipts exist."
    - name: "Scan result laundering"
      risk: "A future scan summary is imported as prose without the artifact, receipt, and validator that produced it."
      detection: "Authoring-contract and evaluation prose require scan artifacts before real Codex Security or Deep Security Scan findings are claimed."
      mitigation: "Integrate only generated scan reports with evidence-registry alignment and explicit claim boundaries."
    - name: "Seed-count overclaim"
      risk: "A large number of deterministic seed runs is presented as evidence of external manuscript quality or domain validity."
      detection: "The seed-sensitivity report and manuscript label seeds as technical replicates and retain local non-claims."
      mitigation: "Report seed variability as computational sensitivity and add independent domain evidence before expanding the claim."
    - name: "Seed-report drift"
      risk: "A stale or edited JSON report hydrates manuscript statistics that no longer match the current configuration."
      detection: "Manuscript hydration validates the report against deterministic recomputation."
      mitigation: "Regenerate analysis outputs and fail hydration when any report field differs from the recomputed payload."
  authoring_obligations:
    - name: "Domain validator"
      obligation: "Add domain-specific evidence before making domain claims beyond the exemplar."
    - name: "Config ownership"
      obligation: "Keep lexicon and slots in config.yaml, not in generated prose."
    - name: "Regeneration contract"
      obligation: "Regenerate outputs through the pipeline, not by hand-editing."
    - name: "Risk review"
      obligation: "Treat high-residual-risk integrity dimensions as fork obligations before publication claims are expanded."
    - name: "AI and template disclosure"
      obligation: "Disclose material AI, template, and automation assistance, and keep responsibility for accuracy and claim boundaries with named human authors."
    - name: "Software and package citation"
      obligation: "Cite the exact software/template release and preserve enough metadata for readers to identify and rebuild the executable manuscript object."
    - name: "Security evidence boundary"
      obligation: "Treat security standards and Codex Security scan phases as scoped guidance unless generated scan artifacts and receipts are present."
  contribution_claims:
    - name: "Five-stage refinery"
      claim: "The refinery pipeline has 5 canonical stages from ore to nine-nines."
      evidence: "src/refinery.py::CANONICAL_STAGES"
      boundary: "local"
    - name: "Monotone purity"
      claim: "Purity increases strictly across all refinery stages."
      evidence: "src/purity.py::assert_monotone_increase"
      boundary: "local"
    - name: "Nine-nines certification"
      claim: "The certification stage achieves 99.9999999% purity."
      evidence: "src/purity.py::NINE_NINES_PURITY"
      boundary: "local"
    - name: "Deterministic tokens"
      claim: "Token selection is deterministic via seeded SHA-256 digest."
      evidence: "src/composition.py::_choose_value"
      boundary: "local"
    - name: "Formalism registry"
      claim: "The manuscript exposes 7 source-owned formalisms with equation labels."
      evidence: "src/formalisms.py::FORMALISMS"
      boundary: "local"
    - name: "Claim-support report separation"
      claim: "The project-local contribution-claim report is written to claim_support_registry.json."
      evidence: "scripts/refinement_analysis.py::CLAIM_SUPPORT_REGISTRY_NAME"
      boundary: "local"
    - name: "Implementation-linked visualizations"
      claim: "The manuscript includes generated visualizations that link the refinery analogy to source code, variables, evidence, and validation gates."
      evidence: "src/figures/diagrams.py::generate_implementation_circuit"
      boundary: "local"
    - name: "Scientific-integrity risk model"
      claim: "The manuscript includes a source-owned integrity risk model linking failure modes, validators, evidence surfaces, and fork obligations."
      evidence: "src/integrity.py::build_integrity_dimensions"
      boundary: "local"
    - name: "Adversarial security assay"
      claim: "The manuscript includes a source-owned security assay mapping adversarial threats and standards to local evidence surfaces, validators, and claim boundaries."
      evidence: "src/security_assay.py::build_security_assay"
      boundary: "local"
    - name: "Seed-sensitivity study"
      claim: "The project reports a declared seed-replicate sensitivity study with precision metadata and explicit non-empirical boundaries."
      evidence: "src/seed_sensitivity.py::run_seed_sensitivity"
      boundary: "local"
  pipeline_phases:
    - name: "Schema intake"
      input_artifact: "manuscript/config.yaml"
      transformation: "Load and validate gold_refinement block"
      output_artifact: "GoldRefinementConfig"
      guard: "config schema tests"
    - name: "Refinery execution"
      input_artifact: "GoldRefinementConfig"
      transformation: "Run five refinery stages with monotone purity"
      output_artifact: "RefineryResult"
      guard: "monotone purity test"
    - name: "Token planning"
      input_artifact: "GoldRefinementConfig"
      transformation: "Expand slots into deterministic token choices"
      output_artifact: "TokenPlan"
      guard: "seed-stability tests"
    - name: "Figure generation"
      input_artifact: "RefineryResult and TokenPlan"
      transformation: "Generate purity progression, karat grading, and token density figures"
      output_artifact: "output/figures/*.png"
      guard: "nonblank figure tests"
    - name: "Integrity risk modeling"
      input_artifact: "audit rules, failure modes, claims, and shared evidence registry"
      transformation: "Score integrity dimensions and summarize evidence tiers"
      output_artifact: "integrity tables and risk visualizations"
      guard: "tests/test_integrity.py"
    - name: "Security assay"
      input_artifact: "gold_refinement.security_assay"
      transformation: "Map adversarial threats and standards to source-owned evidence and claim boundaries"
      output_artifact: "security assay table and variables"
      guard: "tests/test_security_assay.py"
    - name: "Seed sensitivity"
      input_artifact: "GoldRefinementConfig and token plan"
      transformation: "Evaluate token-plan agreement across the declared seed sample and compute bounded precision summaries"
      output_artifact: "output/data/seed_sensitivity.json and seed-sensitivity figure"
      guard: "tests/test_seed_sensitivity.py"
    - name: "Manuscript hydration"
      input_artifact: "manuscript shells and manuscript_variables.json"
      transformation: "Resolve {{TOKEN}} placeholders into output/manuscript/"
      output_artifact: "hydrated Markdown manuscript"
      guard: "unresolved-token scan"
    - name: "Render and validate"
      input_artifact: "output/manuscript"
      transformation: "Render PDF, HTML through shared template pipeline"
      output_artifact: "output/pdf and output/web"
      guard: "render command"
  audit_rules:
    - name: "Purity monotonicity"
      check: "Purity must strictly increase from stage to stage"
      test: "tests/test_refinery.py"
    - name: "Token determinism"
      check: "Same seed and lexicon must produce same token plan"
      test: "tests/test_composition.py"
    - name: "Token coverage"
      check: "Every manuscript {{TOKEN}} must have a generated variable"
      test: "tests/test_manuscript_variables.py"
    - name: "Config validation"
      check: "Invalid config must raise GoldRefinementConfigError"
      test: "tests/test_config.py"
    - name: "Figure generation"
      check: "All figure generators must produce non-blank PNGs"
      test: "tests/test_figures.py"
    - name: "Integrity model coverage"
      check: "Integrity dimensions must have unique IDs, owners, validators, and evidence surfaces"
      test: "tests/test_integrity.py"
    - name: "Scholarship boundary"
      check: "Pre-1800 metallurgy citations must anchor framing and limitations without substituting for domain validation"
      test: "prerender citation/evidence validation plus human source review"
    - name: "Reporting-guideline boundary"
      check: "Checklist-style completeness must not be represented as methodological validity or external reporting compliance"
      test: "prerender citation/evidence validation plus human source review"
    - name: "AI/template accountability"
      check: "Tool assistance must not be represented as authorship or independent responsibility"
      test: "authoring-contract source review plus publication-ethics citation check"
    - name: "Executable-package identity"
      check: "The manuscript must distinguish a regenerated local package from long-term archival preservation or universal executable-paper compliance"
      test: "reproducibility source review plus output statistics and evidence-registry validation"
    - name: "Security assay boundary"
      check: "Security standards and scan phases must be represented as scoped guidance unless generated scan artifacts exist"
      test: "tests/test_security_assay.py and manuscript source review"
    - name: "Seed-sensitivity precision"
      check: "Seed replicates must report sample size, interval methods, conditional assumptions, bounded uncertainty metadata, deterministic bootstrap metadata, and non-empirical claim boundaries"
      test: "tests/test_seed_sensitivity.py, z_generate_manuscript_variables.py, and manuscript source review"
    - name: "Seed-report integrity"
      check: "The generated seed report must match a deterministic recomputation from the current configuration before manuscript hydration"
      test: "src/seed_sensitivity.py::validate_seed_sensitivity_payload and tests/test_seed_sensitivity.py"
  security_assay:
    - threat: "implicit trust in generated artifacts"
      standard: "NIST SP 800-207 zero trust"
      evidence_surface: "output/reports/evidence_registry.json and src/security_assay.py"
      validator: "infrastructure.validation.cli evidence --fail-on-issues"
      claim_boundary: "documents a verification posture, not a deployed zero-trust architecture"
    - threat: "incomplete secure-development evidence"
      standard: "NIST SP 800-218 secure software development framework"
      evidence_surface: "tests/, pre-render validation, and claim ledger"
      validator: "project test suite and template validation gates"
      claim_boundary: "maps local practices to SSDF concepts without claiming SSDF compliance"
    - threat: "supply-chain or build provenance compromise"
      standard: "SLSA v1.2, Sigstore, SPDX, and CycloneDX"
      evidence_surface: "config hash, artifact counts, and publication metadata"
      validator: "pipeline regeneration and artifact registry checks"
      claim_boundary: "identifies provenance requirements but does not assert signed SBOM or provenance is present"
    - threat: "unvalidated vulnerability narrative"
      standard: "MITRE ATT&CK and Codex Security scan phases"
      evidence_surface: "security assay table and future scan artifacts"
      validator: "Codex Security threat-model, discovery, validation, and attack-path receipts when run"
      claim_boundary: "no real scan finding is claimed in this manuscript pass"
    - threat: "secure-by-design overclaim"
      standard: "CISA Secure by Design"
      evidence_surface: "authoring contract and scope limitations"
      validator: "human source review plus citation and evidence validation"
      claim_boundary: "uses guidance to bound responsibilities, not to certify product security"
