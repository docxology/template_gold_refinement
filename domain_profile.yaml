domain: metallurgical_manuscript_composition
display_name: Gold Refinement
required_packages:
  - numpy
  - matplotlib
  - pyyaml
preferred_outputs:
  - pdf
  - html
validation_gates:
  - config_schema
  - refinery_monotone_purity
  - karat_grading
  - deterministic_token_plan
  - seed_sensitivity_precision
  - seed_sensitivity_report_integrity
  - manuscript_token_coverage
  - claim_ledger_alignment
  - render_validation
figure_types:
  - purity_progression
  - karat_grading_chart
  - seed_sensitivity
citation_policy: local_source_or_scholarly
review_gates:
  - purity_monotone_check
  - token_attribution_completeness
  - seed_variability_boundary
  - seed_report_integrity
  - claim_ledger_alignment
stage_mappings:
  - refinery_stage: ore
    domain_operation: raw manuscript drafting
    purity_target: 0.375
    evidence_surface: manuscript/config.yaml
  - refinery_stage: smelting
    domain_operation: remove unsupported prose and duplicated claims
    purity_target: 0.750
    evidence_surface: src/composition.py
  - refinery_stage: assaying
    domain_operation: validate claims against evidence and citations
    purity_target: 0.9167
    evidence_surface: src/evidence.py
  - refinery_stage: cupellation
    domain_operation: resolve cross-references and citation integrity
    purity_target: 0.999
    evidence_surface: src/formalisms.py
  - refinery_stage: certification
    domain_operation: run render and validation gates
    purity_target: 0.999999999
    evidence_surface: scripts/refinement_analysis.py
source_policy: "Claims about manuscript purity must cite project config, source code, or generated artifacts."
artifact_expectations:
  - output/data/refinery_results.json
  - output/reports/token_plan.json
  - output/data/seed_sensitivity.json
  - output/data/manuscript_variables.json
  - output/pdf/template_gold_refinement_combined.pdf
benchmark_rubric:
  name: gold-refinement-readiness
  dimensions:
    - name: purity_progression
      weight: 2.0
    - name: token_provenance
      weight: 2.0
    - name: deterministic_regeneration
      weight: 2.0
    - name: method_surface_clarity
      weight: 1.5
    - name: claim_ledger_alignment
      weight: 1.5
    - name: render_success
      weight: 1.0
    - name: seed_sensitivity_precision
      weight: 1.5
    - name: seed_report_integrity
      weight: 1.5
llm_prompt_guidance: "Use only the configured lexicon, narrative moves, refinery stages, design principles, quality probes, failure modes, authoring obligations, and generated artifacts; do not invent unconfigured token categories or publication claims."
analogy_boundary:
  thesis: "The analogy is load-bearing for staged purification and source-owned validation."
  limits:
    - "It does not certify domain truth without domain-specific validators."
    - "A purity score is not a substitute for evidence."
  non_claims:
    - "The analogy is universal."
    - "The purity scale can replace expert review."
